<!DOCTYPE html>
<html lang="en">
<head>

<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background-color: #fff;
    color: #202124;
    margin: 0;
    padding: 0;
  }

  .container {
    margin-left: 180px;
    margin-top: 100px;
    max-width: 600px;
  }

  h1 {
